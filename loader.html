<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anonymous — Initial Loader</title>
<style>
  :root {
    --bg: #05070a;
    --midnight: #0b1220;
    --graphite: #1b2330;
    --accent: #2f9bff;
    --accent-soft: #7ec4ff;
    --white: #f4f7fb;
  }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    height: 100%;
    overflow: hidden;
  }

  #site-loader {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(ellipse at center, var(--midnight) 0%, var(--bg) 70%);
    z-index: 9999;
    /* opacity/transform only -> compositor-friendly fade out */
    opacity: 1;
    transition: opacity 0.9s cubic-bezier(.4,0,.2,1);
  }

  #site-loader.is-hidden {
    opacity: 0;
    pointer-events: none;
  }

  /* Mask container: the visible shape of the logo. Overflow hidden clips
     the oversized sweep layer moving inside it. */
  .logo-mask {
    position: relative;
    width: 300px;
    height: 300px;
    overflow: hidden;
    -webkit-mask-image: url('logo.png');
    -webkit-mask-size: contain;
    -webkit-mask-repeat: no-repeat;
    -webkit-mask-position: center;
    mask-image: url('logo.png');
    mask-size: contain;
    mask-repeat: no-repeat;
    mask-position: center;

    opacity: 0;
    transform: scale(0.96);
    animation: fadeIn 1.4s cubic-bezier(.2,.9,.3,1) 0.5s forwards;
  }

  /* Base logo tone underneath the moving shine, visible once the sweep
     has passed over a given area. Prevents the logo looking "empty"
     between sweep passes. */
  .logo-mask::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, var(--graphite), #10151d);
  }

  /* The actual shine: a much larger element than its container, so it
     can travel via transform (GPU-accelerated) instead of animating
     background-position (main-thread). Multi-stop gradient gives a
     richer sweep than a single solid blue band. */
  .shine-sweep {
    position: absolute;
    top: -60%;
    left: -60%;
    width: 220%;
    height: 220%;
    background: linear-gradient(
      115deg,
      transparent 0%,
      transparent 38%,
      rgba(47, 155, 255, 0.15) 44%,
      rgba(126, 196, 255, 0.55) 49%,
      var(--white) 50%,
      rgba(126, 196, 255, 0.55) 51%,
      rgba(47, 155, 255, 0.15) 56%,
      transparent 62%,
      transparent 100%
    );
    will-change: transform;
    animation: sweep 4.5s cubic-bezier(.45,0,.2,1) 1.1s infinite;
  }

  @keyframes sweep {
    0%   { transform: translate(-30%, 30%); }
    100% { transform: translate(30%, -30%); }
  }

  @keyframes fadeIn {
    0%   { opacity: 0; transform: scale(0.96); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* Reduced motion: show the logo settled and lit, no sweep loop. */
  @media (prefers-reduced-motion: reduce) {
    .logo-mask { animation: none; opacity: 1; transform: scale(1); }
    .shine-sweep { animation: none; transform: translate(0, 0); opacity: 0.35; }
  }

  /* Fallback for browsers with no mask support at all: show a plain
     logo image instead of an invisible masked element. */
  @supports not ((mask-image: none) or (-webkit-mask-image: none)) {
    .logo-mask { background: none; }
    .logo-mask::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url('logo.png');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
    }
    .shine-sweep { display: none; }
  }
</style>
</head>
<body>

  <div id="site-loader">
    <div class="logo-mask">
      <div class="shine-sweep"></div>
    </div>
  </div>

  <!-- Placeholder for real site content -->
  <main style="min-height:100vh;"></main>

  <script>
    // Lifecycle: keep the loader visible for a minimum time so the
    // animation doesn't flash-cut on fast connections, then fade out
    // once the page has actually finished loading.
    const loader = document.getElementById('site-loader');
    const MIN_VISIBLE_MS = 1800;
    const start = performance.now();

    function hideLoader() {
      const elapsed = performance.now() - start;
      const wait = Math.max(0, MIN_VISIBLE_MS - elapsed);
      setTimeout(() => {
        loader.classList.add('is-hidden');
        // Remove from DOM after the fade transition finishes so it
        // stops intercepting clicks/paint even before pointer-events
        // takes effect on slower devices.
        loader.addEventListener('transitionend', () => loader.remove(), { once: true });
      }, wait);
    }

    if (document.readyState === 'complete') {
      hideLoader();
    } else {
      window.addEventListener('load', hideLoader);
    }
  </script>

</body>
</html>
